<!DOCTYPE html>
<html>
<head>
    <title>Multiple Choice Quiz</title>
</head>
<body>
    <h1>Quiz Form</h1>

    <form method="POST">
        {% for q in questions %}
            <h3>{{ loop.index }}. {{ q.question }}</h3>

            {% for option in q.options %}
                <input type="radio"
                       name="q{{ loop.parent.index0 }}"
                       value="{{ option }}"
                       required>
                {{ option }}<br>
            {% endfor %}

            <br>
        {% endfor %}

        <button type="submit">Submit</button>
    </form>

    {% if score is not none %}
        <h2>Your Score: {{ score }}/{{ total }}</h2>
    {% endif %}
</body>
</html>
